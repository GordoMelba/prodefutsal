<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prode Futsal AFA</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161a22;
    --surface2: #1e2330;
    --border: #2a3040;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --gold: #f5c518;
    --text: #e8eaf0;
    --text2: #8892a4;
    --green: #22c55e;
    --red: #ef4444;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; }

  /* AUTH */
  #auth-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 30% 20%, #00d4ff18 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, #ff6b3518 0%, transparent 50%),
                var(--bg);
    padding: 20px;
  }
  .auth-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
  }
  .auth-logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .auth-logo .logo-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 42px;
    font-weight: 900;
    letter-spacing: -1px;
    line-height: 1;
  }
  .auth-logo .logo-title span { color: var(--accent); }
  .auth-logo .logo-sub {
    font-size: 12px;
    color: var(--text2);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .auth-tabs {
    display: flex;
    background: var(--bg);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 28px;
  }
  .auth-tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 8px;
    color: var(--text2);
    transition: all .2s;
  }
  .auth-tab.active { background: var(--accent); color: #000; }
  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 6px;
  }
  .form-group input, .form-group select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color .2s;
    appearance: none;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
  .form-group select option { background: var(--surface2); }
  .club-select-wrapper { position: relative; }
  .club-select-wrapper::after {
    content: '▾';
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text2);
    pointer-events: none;
  }
  .btn-primary {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 17px;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity .2s, transform .1s;
    margin-top: 8px;
  }
  .btn-primary:hover { opacity: .9; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 20px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger {
    background: transparent;
    color: var(--red);
    border: 1px solid var(--red);
    border-radius: 8px;
    padding: 8px 16px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-danger:hover { background: var(--red); color: #fff; }
  .auth-error {
    background: #ef444420;
    border: 1px solid var(--red);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--red);
    margin-bottom: 16px;
    display: none;
  }

  /* MAIN APP */
  #app { display: none; flex-direction: column; min-height: 100vh; }
  
  /* TOP NAV */
  .topnav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: -0.5px;
  }
  .nav-logo span { color: var(--accent); }
  .nav-user {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .nav-avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    object-fit: cover;
    cursor: pointer;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 16px;
    color: var(--accent);
    overflow: hidden;
  }
  .nav-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

  /* BOTTOM NAV */
  .bottomnav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px 0;
    cursor: pointer;
    color: var(--text2);
    transition: color .2s;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .5px;
    text-transform: uppercase;
    gap: 4px;
  }
  .nav-item.active { color: var(--accent); }
  .nav-item svg { width: 22px; height: 22px; }
  .nav-item span { font-size: 9px; }

  /* MAIN CONTENT */
  .main-content {
    flex: 1;
    padding: 20px 16px 90px;
    max-width: 600px;
    margin: 0 auto;
    width: 100%;
  }

  /* SECTION TITLE */
  .section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: -0.5px;
    margin-bottom: 20px;
  }
  .section-title span { color: var(--accent); }

  /* SCREENS */
  .screen { display: none; }
  .screen.active { display: block; }

  /* PERFIL */
  .profile-header {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    display: flex;
    gap: 20px;
    align-items: center;
    margin-bottom: 20px;
  }
  .profile-avatar-wrap { position: relative; cursor: pointer; }
  .profile-avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 32px;
    color: var(--accent);
    overflow: hidden;
  }
  .profile-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .profile-avatar-edit {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 24px;
    height: 24px;
    background: var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .profile-info { flex: 1; }
  .profile-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 26px;
    font-weight: 800;
  }
  .profile-club {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
  }
  .profile-club img { width: 24px; height: 24px; object-fit: contain; }
  .profile-club span { font-size: 14px; color: var(--text2); }
  .profile-pts {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 36px;
    font-weight: 900;
    color: var(--gold);
    line-height: 1;
    margin-top: 8px;
  }
  .profile-pts-label { font-size: 11px; color: var(--text2); letter-spacing: 1px; text-transform: uppercase; }
  .profile-stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
  }
  .stat-card .num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px;
    font-weight: 900;
    color: var(--accent);
  }
  .stat-card .lbl { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-top: 2px; }

  /* PRODE */
  .fecha-header {
    background: linear-gradient(135deg, var(--surface), var(--surface2));
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .fecha-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text2);
  }
  .fecha-titulo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 900;
  }
  .cierre-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: .5px;
  }
  .cierre-badge.abierto { background: #22c55e20; color: var(--green); border: 1px solid #22c55e50; }
  .cierre-badge.cerrado { background: #ef444420; color: var(--red); border: 1px solid #ef444450; }
  .cierre-badge.bloqueado { background: #f5c51820; color: var(--gold); border: 1px solid #f5c51850; }
  .partido-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
    transition: border-color .2s;
  }
  .partido-card.bloqueado { opacity: .55; }
  .partido-card.con-pronostico { border-color: #00d4ff40; }
  .partido-fecha-hora {
    font-size: 11px;
    color: var(--text2);
    letter-spacing: .5px;
    margin-bottom: 10px;
    text-transform: uppercase;
    font-weight: 600;
  }
  .partido-equipos {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .equipo {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    text-align: center;
  }
  .equipo img {
    width: 40px;
    height: 40px;
    object-fit: contain;
  }
  .equipo-nombre {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 700;
    line-height: 1.2;
  }
  .vs-sep {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 800;
    color: var(--text2);
    letter-spacing: 1px;
  }
  .pronostico-inputs {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .score-input {
    width: 52px;
    height: 52px;
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 10px;
    text-align: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 26px;
    font-weight: 800;
    color: var(--text);
    outline: none;
    transition: border-color .2s;
    -moz-appearance: textfield;
  }
  .score-input::-webkit-outer-spin-button,
  .score-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .score-input:focus { border-color: var(--accent); }
  .score-input:disabled { opacity: .4; cursor: not-allowed; }
  .score-sep {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 900;
    color: var(--text2);
  }
  .partido-bloq-msg {
    font-size: 12px;
    color: var(--gold);
    text-align: center;
    margin-top: 8px;
    font-style: italic;
  }
  .pronostico-resultado {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 8px;
  }
  .pts-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 800;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: .5px;
  }
  .pts-badge.exacto { background: var(--gold); color: #000; }
  .pts-badge.ganador { background: var(--green); color: #fff; }
  .pts-badge.fallado { background: #ef444430; color: var(--red); border: 1px solid #ef444450; }
  .btn-save-prode {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 17px;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all .2s;
    margin-top: 8px;
  }
  .btn-save-prode:hover { opacity: .9; }
  .btn-save-prode:disabled { opacity: .4; cursor: not-allowed; }
  .save-status {
    text-align: center;
    font-size: 13px;
    color: var(--green);
    margin-top: 8px;
    display: none;
  }

  /* TORNEOS */
  .torneo-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: border-color .2s, transform .15s;
  }
  .torneo-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .torneo-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .torneo-nombre {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 800;
  }
  .torneo-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .torneo-badge.club { background: #f5c51820; color: var(--gold); border: 1px solid #f5c51850; }
  .torneo-badge.privado { background: #00d4ff20; color: var(--accent); border: 1px solid #00d4ff50; }
  .torneo-meta { font-size: 13px; color: var(--text2); }
  .btn-crear-torneo {
    width: 100%;
    background: transparent;
    color: var(--accent);
    border: 2px dashed var(--accent);
    border-radius: var(--radius);
    padding: 16px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all .2s;
    margin-bottom: 20px;
  }
  .btn-crear-torneo:hover { background: #00d4ff15; }

  /* TABLA POSICIONES */
  .tabla-posiciones {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 20px;
  }
  .tabla-header {
    display: grid;
    grid-template-columns: 36px 1fr 60px 60px 60px;
    padding: 10px 16px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text2);
  }
  .tabla-row {
    display: grid;
    grid-template-columns: 36px 1fr 60px 60px 60px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    align-items: center;
    transition: background .15s;
  }
  .tabla-row:last-child { border-bottom: none; }
  .tabla-row:hover { background: var(--surface2); }
  .tabla-row.yo { background: #00d4ff0d; border-left: 3px solid var(--accent); }
  .tabla-pos {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 800;
    color: var(--text2);
  }
  .tabla-pos.top1 { color: var(--gold); }
  .tabla-pos.top2 { color: #c0c0c0; }
  .tabla-pos.top3 { color: #cd7f32; }
  .tabla-user {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .tabla-avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 13px;
    color: var(--accent);
    overflow: hidden;
    flex-shrink: 0;
  }
  .tabla-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .tabla-username { font-weight: 600; font-size: 14px; }
  .tabla-club-icon { width: 18px; height: 18px; object-fit: contain; }
  .tabla-pts {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 900;
    color: var(--gold);
    text-align: center;
  }
  .tabla-num {
    font-size: 13px;
    color: var(--text2);
    text-align: center;
  }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: #000000cc;
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    width: 100%;
    max-width: 440px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 24px;
    font-weight: 900;
    margin-bottom: 20px;
  }
  .modal-close {
    float: right;
    background: none;
    border: none;
    color: var(--text2);
    font-size: 22px;
    cursor: pointer;
    line-height: 1;
  }
  .invite-link-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    font-size: 13px;
    color: var(--accent);
    word-break: break-all;
    margin-bottom: 12px;
    font-family: monospace;
  }

  /* ADMIN */
  .admin-banner {
    background: linear-gradient(135deg, #ff6b3520, #ff6b3510);
    border: 1px solid #ff6b3550;
    border-radius: var(--radius);
    padding: 12px 16px;
    margin-bottom: 20px;
    font-size: 13px;
    color: var(--accent2);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .resultado-input-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
  }
  .resultado-equipos {
    flex: 1;
    font-size: 13px;
    font-weight: 600;
    line-height: 1.3;
  }
  .resultado-scores {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .resultado-score-in {
    width: 44px;
    height: 44px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    text-align: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    outline: none;
    -moz-appearance: textfield;
  }
  .resultado-score-in::-webkit-outer-spin-button,
  .resultado-score-in::-webkit-inner-spin-button { -webkit-appearance: none; }
  .resultado-score-in:focus { border-color: var(--accent2); }

  /* LOADING */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    color: var(--text2);
    font-size: 14px;
    gap: 10px;
  }
  .spinner {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }

// ─── HELPERS ──────────────────────────────────────────────────────────────────

function getClub(id) { return CLUBES.find(c => c.id === id) || { nombre: id, logo: '' }; }

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  setTimeout(() => t.className = '', 2500);
}

function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = 'block';
}
function hideError(id) { document.getElementById(id).style.display = 'none'; }

function openModal(id) { document.getElementById(id).classList.add('open'); }
window.closeModal = (id) => document.getElementById(id).classList.remove('open');

function primerPartidoTimestamp() {
  const primerPartido = FECHA_ACTUAL.partidos.filter(p => !p.bloqueado)
    .sort((a,b) => new Date(`${a.fecha}T${a.hora}`) - new Date(`${b.fecha}T${b.hora}`))[0];
  return new Date(`${primerPartido.fecha}T${primerPartido.hora}:00`);
}

function isProdeAbierto() {
  const cierre = new Date(primerPartidoTimestamp().getTime() - 2*60*60*1000);
  return new Date() < cierre;
}

function formatFechaHora(fecha, hora) {
  const d = new Date(`${fecha}T${hora}:00`);
  return d.toLocaleDateString('es-AR', { weekday:'short', day:'numeric', month:'short' }) + ' · ' + hora + 'hs';
}

function calcPuntos(pronostico, resultado) {
  if (!resultado || resultado.local === '' || resultado.visitante === '') return null;
  const pLocal = parseInt(pronostico.local);
  const pVisit = parseInt(pronostico.visitante);
  const rLocal = parseInt(resultado.local);
  const rVisit = parseInt(resultado.visitante);
  if (pLocal === rLocal && pVisit === rVisit) return { pts: 6, tipo: 'exacto' };
  const pGana = pLocal > pVisit ? 'L' : pLocal < pVisit ? 'V' : 'E';
  const rGana = rLocal > rVisit ? 'L' : rLocal < rVisit ? 'V' : 'E';
  if (pGana === rGana) return { pts: 3, tipo: 'ganador' };
  return { pts: 0, tipo: 'fallado' };
}

window.switchTab = function(tab) {
  document.getElementById('tab-login').style.display = tab === 'login' ? '' : 'none';

  document.querySelectorAll('.auth-tab').forEach((el, i) => {
    el.classList.toggle('active', (i===0 && tab==='login') || (i===1 && tab==='register'));
  });
  hideError('auth-error');
};

window.doLogin = async function() {
  hideError('auth-error');
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  if (!email || !pass) return showError('auth-error', 'Completá todos los campos');
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    const msgs = { 'auth/user-not-found':'Usuario no encontrado', 'auth/wrong-password':'Contraseña incorrecta', 'auth/invalid-credential':'Email o contraseña incorrectos' };
    showError('auth-error', msgs[e.code] || 'Error al iniciar sesión');
  }
};

window.doRegister = async function() {
  hideError('auth-error');
  const username = document.getElementById('reg-username').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-pass').value;
  const club = document.getElementById('reg-club').value;
  if (!username || !email || !pass || !club) return showError('auth-error', 'Completá todos los campos');
  if (pass.length < 6) return showError('auth-error', 'La contraseña debe tener al menos 6 caracteres');
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await updateProfile(cred.user, { displayName: username });
    await setDoc(doc(db, 'usuarios', cred.user.uid), {
      username, email, club, photoURL: '', puntosTotal: 0,
      exactos: 0, ganadores: 0, fallados: 0,
      createdAt: serverTimestamp()
    });
    // Crear torneo de club automáticamente si no existe
    const clubData = getClub(club);
    const torneoClubRef = doc(db, 'torneos', `club_${club}`);
    const torneoClubSnap = await getDoc(torneoClubRef);
    if (!torneoClubSnap.exists()) {
      await setDoc(torneoClubRef, {
        nombre: `Hinchas de ${clubData.nombre}`,
        tipo: 'club', clubId: club,
        miembros: [cred.user.uid],
        createdAt: serverTimestamp()
      });
    } else {
      await updateDoc(torneoClubRef, { miembros: arrayUnion(cred.user.uid) });
    }
  } catch(e) {
    const msgs = { 'auth/email-already-in-use':'Ese email ya está registrado' };
    showError('auth-error', msgs[e.code] || 'Error al crear cuenta');
  }
};

  const navEl = document.getElementById(`nav-${screen}`);
  if (navEl) navEl.classList.add('active');
  currentScreen = screen;
  if (screen === 'prode') renderProde();
  if (screen === 'torneos') renderTorneos();
  if (screen === 'perfil') renderPerfil();
  if (screen === 'admin') renderAdmin();
};

onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;
    const snap = await getDoc(doc(db, 'usuarios', user.uid));
    if (snap.exists()) {
      currentUserData = snap.data();
    }
    // Verificar invitación en URL
    const params = new URLSearchParams(window.location.search);
    const inviteId = params.get('join');
    if (inviteId) {
      await joinTorneo(inviteId);
      window.history.replaceState({}, '', window.location.pathname);
    }
    // Mostrar admin si corresponde
    if (user.email === ADMIN_EMAIL || ADMIN_EMAIL === '') {
      document.getElementById('nav-admin').style.display = 'flex';
    }
    // Mostrar avatar inicial
    const initial = (currentUserData?.username || user.email)[0].toUpperCase();
    document.getElementById('nav-avatar-initial').textContent = initial;
    if (currentUserData?.photoURL) {
      document.getElementById('nav-avatar-initial').innerHTML = `<img src="${currentUserData.photoURL}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;

async function renderProde() {
  const el = document.getElementById('prode-content');
  el.innerHTML = '<div class="loading"><div class="spinner"></div> Cargando...</div>';
  
  const abierto = isProdeAbierto();
  const cierre = new Date(primerPartidoTimestamp().getTime() - 2*60*60*1000);
  
  // Cargar pronósticos existentes
  let pronosticos = {};
  const proSnap = await getDoc(doc(db, 'pronosticos', `${currentUser.uid}_fecha${FECHA_ACTUAL.numero}`));
  if (proSnap.exists()) pronosticos = proSnap.data().partidos || {};

  // Cargar resultados
  let resultados = {};
  const resSnap = await getDoc(doc(db, 'resultados', `fecha${FECHA_ACTUAL.numero}`));
  if (resSnap.exists()) resultados = resSnap.data().partidos || {};

  let html = `
    <div class="fecha-header">
      <div>
        <div class="fecha-num">Fecha ${FECHA_ACTUAL.numero}</div>
        <div class="fecha-titulo">Futsal AFA · Primera A</div>
      </div>
      <div class="cierre-badge ${abierto?'abierto':'cerrado'}">
        ${abierto ? '🟢 Abierto' : '🔴 Cerrado'}
      </div>
    </div>
  `;

  if (abierto) {
    html += `<p style="font-size:13px;color:var(--text2);margin-bottom:16px;text-align:center">Cierre: ${cierre.toLocaleDateString('es-AR',{weekday:'short',day:'numeric',month:'short'})} a las ${cierre.getHours()}:${String(cierre.getMinutes()).padStart(2,'0')}hs</p>`;
  }

  FECHA_ACTUAL.partidos.forEach(p => {
    const local = getClub(p.local);
    const visitante = getClub(p.visitante);
    const pro = pronosticos[p.id] || {};
    const res = resultados[p.id];
    const bloq = p.bloqueado || !abierto;
    const tienePro = pro.local !== undefined;
    let ptsBadge = '';
    if (res && tienePro) {
      const calc = calcPuntos(pro, res);
      if (calc) {
        const labels = { exacto:'⭐ +6 pts', ganador:'✓ +3 pts', fallado:'✗ 0 pts' };
        ptsBadge = `<div class="pronostico-resultado"><span class="pts-badge ${calc.tipo}">${labels[calc.tipo]}</span></div>`;
      }
    }

    html += `<div class="partido-card ${p.bloqueado?'bloqueado':''} ${tienePro&&!p.bloqueado?'con-pronostico':''}">
      <div class="partido-fecha-hora">${formatFechaHora(p.fecha, p.hora)}</div>
      <div class="partido-equipos">
        <div class="equipo">
          <img src="${local.logo}" alt="${local.nombre}" onerror="this.style.display='none'">
          <div class="equipo-nombre">${local.nombre}</div>
        </div>
        <div class="vs-sep">VS</div>
        <div class="equipo">
          <img src="${visitante.logo}" alt="${visitante.nombre}" onerror="this.style.display='none'">
          <div class="equipo-nombre">${visitante.nombre}</div>
        </div>
      </div>`;

    if (p.bloqueado) {
      html += `<p class="partido-bloq-msg">🔒 ${p.bloqueadoMsg}</p>`;
    } else if (!abierto && res) {
      // Mostrar resultado real
      html += `<div class="pronostico-inputs">
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:900;color:var(--gold)">${res.local} - ${res.visitante}</div>
      </div>
      ${ptsBadge}`;
      if (tienePro) {
        html += `<div style="text-align:center;font-size:12px;color:var(--text2);margin-top:6px">Tu pronóstico: ${pro.local} - ${pro.visitante}</div>`;
      }
    } else if (!abierto) {
      html += `<div class="pronostico-inputs">
        <div style="font-size:13px;color:var(--text2)">Esperando resultado...</div>
      </div>
      ${tienePro ? `<div style="text-align:center;font-size:12px;color:var(--text2);margin-top:6px">Tu pronóstico: ${pro.local} - ${pro.visitante}</div>` : ''}`;
    } else {
      html += `<div class="pronostico-inputs">
        <input type="number" class="score-input" id="score_${p.id}_local" min="0" max="99" value="${pro.local ?? ''}" placeholder="0">
        <span class="score-sep">-</span>
        <input type="number" class="score-input" id="score_${p.id}_visit" min="0" max="99" value="${pro.visitante ?? ''}" placeholder="0">
      </div>`;
    }

    html += `</div>`;
  });

  if (abierto) {
    html += `<button class="btn-save-prode" onclick="guardarPronostico()">Guardar Pronóstico</button>
    <div class="save-status" id="save-status">✓ Pronóstico guardado</div>`;
  }

  el.innerHTML = html;
}

window.guardarPronostico = async function() {
  if (!isProdeAbierto()) return showToast('El prode ya está cerrado', 'error');
  const partidos = {};
  let completo = true;
  for (const p of FECHA_ACTUAL.partidos.filter(p => !p.bloqueado)) {
    const lEl = document.getElementById(`score_${p.id}_local`);
    const vEl = document.getElementById(`score_${p.id}_visit`);
    if (!lEl || !vEl) continue;
    const l = lEl.value;
    const v = vEl.value;
    if (l === '' || v === '') { completo = false; break; }
    partidos[p.id] = { local: parseInt(l), visitante: parseInt(v) };
  }
  if (!completo) return showToast('Completá todos los pronósticos', 'error');
  try {
    await setDoc(doc(db, 'pronosticos', `${currentUser.uid}_fecha${FECHA_ACTUAL.numero}`), {
      uid: currentUser.uid,
      fecha: FECHA_ACTUAL.numero,
      partidos,
      updatedAt: serverTimestamp()
    }, { merge: true });
    const status = document.getElementById('save-status');
    if (status) { status.style.display = 'block'; setTimeout(() => status.style.display = 'none', 3000); }
    showToast('✓ Pronóstico guardado');
  } catch(e) {
    showToast('Error al guardar', 'error');
  }
};

window.uploadAvatar = async function(e) {
  const file = e.target.files[0];
  if (!file) return;
  showToast('Subiendo foto...');
  try {
    const storRef = ref(storage, `avatars/${currentUser.uid}`);
    await uploadBytes(storRef, file);
    const url = await getDownloadURL(storRef);
    await updateDoc(doc(db, 'usuarios', currentUser.uid), { photoURL: url });
    currentUserData.photoURL = url;
    renderPerfil();
    // Actualizar nav avatar
    document.getElementById('nav-avatar-initial').innerHTML = `<img src="${url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
    showToast('Foto actualizada');
  } catch(e) {

  }
};

window.saveUsername = async function() {
  const val = document.getElementById('edit-username').value.trim();
  if (!val) return showToast('Nombre vacío', 'error');
  await updateDoc(doc(db, 'usuarios', currentUser.uid), { username: val });
  currentUserData.username = val;
  document.getElementById('nav-avatar-initial').textContent = val[0].toUpperCase();

window.saveClub = async function() {
  const val = document.getElementById('edit-club').value;
  const oldClub = currentUserData.club;
  if (val === oldClub) return;
  await updateDoc(doc(db, 'usuarios', currentUser.uid), { club: val });
  // Quitar del torneo viejo y agregar al nuevo
  await updateDoc(doc(db, 'torneos', `club_${oldClub}`), { miembros: arrayRemove(currentUser.uid) }).catch(()=>{});
  const nuevoTorneoRef = doc(db, 'torneos', `club_${val}`);
  const ntSnap = await getDoc(nuevoTorneoRef);
  const clubData = getClub(val);
  if (!ntSnap.exists()) {
    await setDoc(nuevoTorneoRef, { nombre: `Hinchas de ${clubData.nombre}`, tipo: 'club', clubId: val, miembros: [currentUser.uid], createdAt: serverTimestamp() });
  } else {
    await updateDoc(nuevoTorneoRef, { miembros: arrayUnion(currentUser.uid) });
  }
  currentUserData.club = val;
  showToast('Club actualizado');
  renderPerfil();
};

window.guardarResultados = async function() {
  const partidos = {};
  for (const p of FECHA_ACTUAL.partidos.filter(p => !p.bloqueado)) {
    const l = document.getElementById(`res_${p.id}_local`)?.value;
    const v = document.getElementById(`res_${p.id}_visit`)?.value;
    if (l !== '' && v !== '') {
      partidos[p.id] = { local: parseInt(l), visitante: parseInt(v) };
    }
  }

  await setDoc(doc(db, 'resultados', `fecha${FECHA_ACTUAL.numero}`), {
    fecha: FECHA_ACTUAL.numero,
    partidos,
    updatedAt: serverTimestamp()
  });

  // Calcular puntos para cada usuario
  const proQ = query(collection(db, 'pronosticos'), where('fecha', '==', FECHA_ACTUAL.numero));
  const proSnap = await getDocs(proQ);
  let calculados = 0;

  for (const proDoc of proSnap.docs) {
    const pro = proDoc.data();
    let pts = 0, exactos = 0, ganadores = 0, fallados = 0;
    for (const [pid, pv] of Object.entries(pro.partidos || {})) {
      const res = partidos[pid];
      if (!res) continue;
      const calc = calcPuntos(pv, res);
      if (!calc) continue;
      pts += calc.pts;
      if (calc.tipo === 'exacto') exactos++;
      else if (calc.tipo === 'ganador') ganadores++;
      else fallados++;
    }
    // Actualizar usuario
    const uRef = doc(db, 'usuarios', pro.uid);
    const uSnap = await getDoc(uRef);
    if (uSnap.exists()) {
      const ud = uSnap.data();
      await updateDoc(uRef, {
        puntosTotal: (ud.puntosTotal || 0) + pts,
        exactos: (ud.exactos || 0) + exactos,
        ganadores: (ud.ganadores || 0) + ganadores,
        fallados: (ud.fallados || 0) + fallados,
      });
    }
    // Marcar pronóstico como calculado
    await updateDoc(doc(db, 'pronosticos', proDoc.id), { calculado: true, puntosObtenidos: pts });
    calculados++;
  }

  // Refrescar datos propios
  const mySnap = await getDoc(doc(db, 'usuarios', currentUser.uid));
  if (mySnap.exists()) currentUserData = mySnap.data();

  const status = document.getElementById('admin-status');
  status.textContent = `✓ Resultados guardados. ${calculados} pronósticos calculados.`;
  status.style.display = 'block';
  showToast('Resultados guardados y puntos calculados');
};
